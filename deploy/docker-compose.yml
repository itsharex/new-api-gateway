services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_gateway
    ports:
      - "5432:5432"
    volumes:
      - audit-postgres:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  audit-postgres:
