name: new-api-gateway

services:
  # ── Infrastructure ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_gateway
    volumes:
      - audit-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_gateway"]
      interval: 2s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - audit-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  # ── Core services (production) ─────────────────────
  audit-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AUDIT_GATEWAY_PORT:-8080}:8080"
    environment:
      AUDIT_GATEWAY_LISTEN_ADDR: ":8080"
      NEW_API_BASE_URL: ${NEW_API_BASE_URL:?NEW_API_BASE_URL is required}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:?AUDIT_HMAC_SECRET is required}
      EVIDENCE_STORAGE_BACKEND: ${EVIDENCE_STORAGE_BACKEND:-filesystem}
      EVIDENCE_STORAGE_DIR: /evidence
      POSTGRES_DSN: ${AUDIT_GW_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      NEW_API_POSTGRES_DSN: ${NEW_API_POSTGRES_DSN:?NEW_API_POSTGRES_DSN is required}
      REDIS_ADDR: redis:6379
    volumes:
      - ${EVIDENCE_HOST_DIR:-./var/evidence}:/evidence
    restart: unless-stopped
  analysis-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      ANALYSIS_CORE_READ_COUNT: ${ANALYSIS_CORE_READ_COUNT:-16}
      ANALYSIS_CORE_MAX_INFLIGHT: ${ANALYSIS_CORE_MAX_INFLIGHT:-8}
      ANALYSIS_CORE_LEASE_SECONDS: ${ANALYSIS_CORE_LEASE_SECONDS:-300}
      ANALYSIS_CORE_RETRY_LIMIT: ${ANALYSIS_CORE_RETRY_LIMIT:-5}
      EVIDENCE_STORAGE_BACKEND: filesystem
      EVIDENCE_STORAGE_DIR: /evidence
      LLM_JUDGE_BASE_URL:
      LLM_JUDGE_MODEL:
      LLM_JUDGE_API_KEY:
      LLM_JUDGE_TIMEOUT_SECONDS:
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_INDEX_STRATEGY: unsafe-best-match
    volumes:
      - ..:/workspace
      - ${EVIDENCE_HOST_DIR:-./var/evidence}:/evidence
    command: ["sh", "-c", "uv sync --quiet && exec uv run python main.py"]
    restart: unless-stopped
  analysis-enrichment-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      ANALYSIS_REDIS_LIST: analysis.enrichment
      ANALYSIS_ENRICHMENT_READ_COUNT: ${ANALYSIS_ENRICHMENT_READ_COUNT:-16}
      ANALYSIS_ENRICHMENT_MAX_INFLIGHT: ${ANALYSIS_ENRICHMENT_MAX_INFLIGHT:-8}
      ANALYSIS_ENRICHMENT_LEASE_SECONDS: ${ANALYSIS_ENRICHMENT_LEASE_SECONDS:-300}
      ANALYSIS_ENRICHMENT_RETRY_LIMIT: ${ANALYSIS_ENRICHMENT_RETRY_LIMIT:-5}
      ANALYSIS_ENRICHMENT_LLM_MAX_CONCURRENCY: ${ANALYSIS_ENRICHMENT_LLM_MAX_CONCURRENCY:-8}
      EVIDENCE_STORAGE_BACKEND: filesystem
      EVIDENCE_STORAGE_DIR: /evidence
      LLM_JUDGE_BASE_URL:
      LLM_JUDGE_MODEL:
      LLM_JUDGE_API_KEY:
      LLM_JUDGE_TIMEOUT_SECONDS:
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_INDEX_STRATEGY: unsafe-best-match
    volumes:
      - ..:/workspace
      - ${EVIDENCE_HOST_DIR:-./var/evidence}:/evidence
    command: ["sh", "-c", "uv sync --quiet && exec uv run python main.py"]
    restart: unless-stopped

  analysis-batch:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      LLM_JUDGE_BASE_URL:
      LLM_JUDGE_MODEL:
      LLM_JUDGE_API_KEY:
      LLM_JUDGE_TIMEOUT_SECONDS:
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_INDEX_STRATEGY: unsafe-best-match
    volumes:
      - ..:/workspace
    command: ["sh", "-c", "uv sync --quiet && exec uv run python batch_scheduler.py"]

  # ── On-demand services ─────────────────────────────
  migrate:
    image: postgres:16
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: audit
      POSTGRES_DB: ${POSTGRES_DB:-audit_gateway}
    volumes:
      - ../migrations:/migrations:ro
      - ../scripts:/scripts:ro
    command: ["/scripts/run_migrations.sh"]
volumes:
  audit-postgres:
  audit-redis:
