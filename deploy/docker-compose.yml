name: new-api-gateway

services:
  # ── Infrastructure ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_gateway
    volumes:
      - audit-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_gateway"]
      interval: 2s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - audit-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  # ── Core services (production) ─────────────────────
  audit-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${AUDIT_GATEWAY_PORT:-8080}:8080"
    environment:
      AUDIT_GATEWAY_LISTEN_ADDR: ":8080"
      NEW_API_BASE_URL: ${NEW_API_BASE_URL:?NEW_API_BASE_URL is required}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:?AUDIT_HMAC_SECRET is required}
      EVIDENCE_STORAGE_BACKEND: ${EVIDENCE_STORAGE_BACKEND:-filesystem}
      EVIDENCE_STORAGE_DIR: /evidence
      POSTGRES_DSN: ${AUDIT_GW_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      NEW_API_POSTGRES_DSN: ${NEW_API_POSTGRES_DSN:?NEW_API_POSTGRES_DSN is required}
      REDIS_ADDR: redis:6379
    volumes:
      - ${EVIDENCE_HOST_DIR:-./var/evidence}:/evidence
    restart: unless-stopped
  analysis-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      EVIDENCE_STORAGE_BACKEND: filesystem
      EVIDENCE_STORAGE_DIR: /evidence
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
      EMBEDDING_URL: http://embedding:8000
      UV_INDEX_STRATEGY: unsafe-best-match
    volumes:
      - ..:/workspace
      - ${EVIDENCE_HOST_DIR:-./var/evidence}:/evidence
    command: ["sh", "-c", "uv sync --quiet && exec uv run python main.py"]
    restart: unless-stopped

  # ── On-demand services ─────────────────────────────
  migrate:
    image: postgres:16
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: audit
      POSTGRES_DB: ${POSTGRES_DB:-audit_gateway}
    volumes:
      - ../migrations:/migrations:ro
    command: >
      sh -c 'for f in /migrations/*.sql; do
        echo "applying $$f";
        psql -h postgres -U audit -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f "$$f";
      done'
  analysis-batch:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
      UV_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
      UV_INDEX_STRATEGY: unsafe-best-match
    volumes:
      - ..:/workspace
    entrypoint: >
      sh -c '
        uv sync &&
        echo "0 * * * * cd /workspace/workers/analysis_worker && uv run python main.py --offline-batch" > /etc/crontabs/root &&
        crond -f
      '
  embedding:
    build:
      context: ./embedding
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HOME: /data
      TRANSFORMERS_CACHE: /data
    volumes:
      - embedding-model-cache:/data
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
volumes:
  audit-postgres:
  audit-redis:
  embedding-model-cache:
