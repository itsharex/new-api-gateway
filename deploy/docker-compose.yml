name: new-api-gateway

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_gateway
    ports:
      - "5432:5432"
    volumes:
      - audit-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_gateway"]
      interval: 2s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20
  migrate:
    image: postgres:16
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: audit
      POSTGRES_DB: ${POSTGRES_DB:-audit_gateway}
    volumes:
      - ../migrations:/migrations:ro
    command: >
      sh -c 'for f in /migrations/*.sql; do
        echo "applying $$f";
        psql -h postgres -U audit -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f "$$f";
      done'
  analysis-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /workspace/workers/analysis_worker
    environment:
      EVIDENCE_STORAGE_DIR: /evidence
      POSTGRES_DSN: ${ANALYSIS_WORKER_POSTGRES_DSN:-postgres://audit:audit@postgres:5432/audit_gateway?sslmode=disable}
      REDIS_URL: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/analysis-worker-venv
    volumes:
      - ..:/workspace
      - ${EVIDENCE_STORAGE_DIR:-../var/e2e-evidence}:/evidence
volumes:
  audit-postgres:
